x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

networks:
  backend:
    driver: bridge

services:
  # ===========================================================================
  # Data layer
  # ===========================================================================
  postgres:
    image: postgres:18.4-alpine
    container_name: postgres
    restart: unless-stopped
    logging: *logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./data/postgres:/var/lib/postgresql
      - ./config/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - backend

  redis:
    image: redis:8.8.0-alpine
    container_name: redis
    restart: unless-stopped
    logging: *logging
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1000
      --appendonly yes
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - backend

  qdrant:
    image: qdrant/qdrant:v1.18.3
    container_name: qdrant
    restart: unless-stopped
    logging: *logging
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/6333"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend

  # ===========================================================================
  # Inference
  # ===========================================================================
  vllm:
    image: vllm/vllm-openai:patched-qwen3vl-pp
    container_name: vllm
    restart: unless-stopped
    logging: *logging
    ipc: host
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_NO_USAGE_STATS: 1
      DO_NOT_TRACK: 1
      HF_HUB_OFFLINE: 1
    volumes:
      - ${MODEL_DIR}:/models
    ports:
      - "${VLLM_PORT}:8000"
    command:
      - "--model"
      - "${MODEL_NAME}"
      - "--served-model-name"
      - "qwen3-vl"
      - "--tensor-parallel-size"
      - "${TENSOR_PARALLEL_SIZE}"
      - "--pipeline-parallel-size"
      - "${PIPELINE_PARALLEL_SIZE}"
      - "--enable-auto-tool-choice"
      - "--tool-call-parser"
      - "hermes"
      - "--dtype"
      - "${DTYPE}"
      - "--max-model-len"
      - "${MAX_MODEL_LEN}"
      - "--gpu-memory-utilization"
      - "${GPU_MEMORY_UTILIZATION}"
      - "--max-num-seqs"
      - "${MAX_NUM_SEQS}"
      - "--host"
      - "0.0.0.0"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 300s
    networks:
      - backend

  dcgm-exporter:
    image: nvidia/dcgm-exporter:4.8.3
    container_name: dcgm-exporter
    restart: unless-stopped
    logging: *logging
    runtime: nvidia
    cap_add:
      - SYS_ADMIN
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    ports:
      - "${DCGM_PORT}:9400"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - backend

  # ===========================================================================
  # Applications
  # ===========================================================================
  n8n:
    image: n8nio/n8n:2.31.5
    container_name: n8n
    restart: unless-stopped
    logging: *logging
    ports:
      - "${N8N_PORT}:5678"
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      N8N_HOST: ${NODE_IP}:${N8N_PORT}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${NODE_IP}:${N8N_PORT}/
      N8N_EDITOR_BASE_URL: http://${NODE_IP}:${N8N_PORT}/
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      N8N_USER_MANAGEMENT_JWT_SECRET: ${N8N_JWT_SECRET}
      N8N_DIAGNOSTICS_ENABLED: "false"
      N8N_PERSONALIZATION_ENABLED: "false"
      N8N_SECURE_COOKIE: "false"
      EXECUTIONS_DATA_PRUNE: "true"
      EXECUTIONS_DATA_MAX_AGE: "168"
      GENERIC_TIMEZONE: ${TZ:-UTC}
    volumes:
      - ./data/n8n:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 40s
    networks:
      - backend

  open-webui:
    image: ghcr.io/open-webui/open-webui:v0.10.2
    container_name: open-webui
    restart: unless-stopped
    logging: *logging
    ports:
      - "${OPEN_WEBUI_PORT}:8080"
    environment:
      ENV: prod
      WEBUI_AUTH: "True"
      WEBUI_SECRET_KEY: ${WEBUI_SECRET_KEY}
      ENABLE_SIGNUP: ${OPEN_WEBUI_ENABLE_SIGNUP:-false}
      OPENAI_API_BASE_URL: http://vllm:8000/v1
      RAG_EMBEDDING_ENGINE: openai
      RAG_OPENAI_API_BASE_URL: http://vllm:8000/v1
      RAG_EMBEDDING_MODEL: qwen3-vl
      VECTOR_DB: qdrant
      QDRANT_URL: http://qdrant:6333
      QDRANT_URI: http://qdrant:6333
      WHISPER_MODEL: ${WHISPER_MODEL:-base}
      WHISPER_MODEL_DIR: /app/backend/data/whisper/models
      WHISPER_COMPUTE_TYPE: ${WHISPER_COMPUTE_TYPE:-int8}
      WHISPER_MULTILINGUAL: "true"
      DO_NOT_TRACK: "true"
    volumes:
      - ./data/open-webui:/app/backend/data
    depends_on:
      vllm:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - backend

  # ===========================================================================
  # Observability
  # ===========================================================================
  prometheus:
    image: prom/prometheus:v3.13.1
    container_name: prometheus
    restart: unless-stopped
    logging: *logging
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=30d
      - --web.enable-lifecycle
    volumes:
      - ./config/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/prometheus/rules:/etc/prometheus/rules:ro
      - ./data/prometheus:/prometheus
    ports:
      - "${PROMETHEUS_PORT}:9090"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - backend

  grafana:
    image: grafana/grafana:13.0.3
    container_name: grafana
    restart: unless-stopped
    logging: *logging
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SERVER_ROOT_URL: http://${NODE_IP}:${GRAFANA_PORT}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./data/grafana:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - backend

  loki:
    image: grafana/loki:3.7.3
    container_name: loki
    restart: unless-stopped
    logging: *logging
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./data/loki:/loki
    healthcheck:
      disable: true
    networks:
      - backend

  promtail:
    image: grafana/promtail:3.7.3
    container_name: promtail
    restart: unless-stopped
    logging: *logging
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./config/promtail/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_started
    networks:
      - backend

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    logging: *logging
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    pid: host
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9100/metrics"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - backend

  alertmanager:
    image: prom/alertmanager:v0.33.1
    container_name: alertmanager
    restart: unless-stopped
    logging: *logging
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./config/prometheus/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./data/alertmanager:/alertmanager
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9093/-/healthy"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 15s
    networks:
      - backend
