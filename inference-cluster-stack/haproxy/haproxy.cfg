global
    log stdout format raw local0
    maxconn 4096

defaults
    mode http
    log global
    option httplog
    timeout connect 10s
    timeout client 300s
    timeout server 300s
    retries 2

frontend llm_front
    bind *:8080
    default_backend llm_backends

backend llm_backends
    balance roundrobin
    option httpchk GET /v1/models
    http-check expect status 200
    server local-vllm localhost:8000 check inter 10s

listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 10s
